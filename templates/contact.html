<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us &mdash; SREC CampusConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #3b5bdb; --primary-dark: #2f4ac0; --primary-light: #e8edff;
      --bg: #f0f2f8; --surface: #ffffff; --border: #e2e6f0;
      --text: #1a1d2e; --text2: #5a6075; --text3: #9da3b8;
      --radius: 14px; --shadow-lg: 0 8px 32px rgba(59,91,219,0.13);
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem 1rem;
    }
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 2.5rem 2rem;
      width: 100%; max-width: 580px; border: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; text-decoration: none; }
    .logo i { color: var(--primary); font-size: 1.3rem; }
    .logo span { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
    .subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--text2); margin-bottom: 0.35rem; }
    input, textarea, select {
      width: 100%; padding: 0.72rem 1rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 0.93rem; color: var(--text);
      background: #f7f8fc; transition: border-color 0.18s, box-shadow 0.18s; outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background: #fff;
    }
    textarea { resize: vertical; min-height: 130px; }
    .btn {
      width: 100%; padding: 0.88rem; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 0.4rem;
      transition: background 0.18s, transform 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }
    .alert { padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.88rem;
             margin-top: 1rem; display: none; font-weight: 600; }
    .alert.success { background: #d4f5e9; color: #1a6640; border-left: 4px solid #2fb86e; display: block; }
    .alert.error   { background: #fde8e8; color: #a12c2c; border-left: 4px solid #f03e3e; display: block; }
    .back-link { margin-top: 1.2rem; text-align: center; font-size: 0.85rem; color: var(--text2); }
    .back-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .back-link a:hover { text-decoration: underline; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4);
               border-top-color: #fff; border-radius: 50%;
               animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media(max-width: 500px) { .row { grid-template-columns: 1fr; } .card { padding: 1.5rem 1rem; } }
  </style>
</head>
<body>
<div class="card">
  <a href="/dashboard" class="logo">
    <i class="fas fa-layer-group"></i>
    <span>CampusConnect</span>
  </a>

  <h1>Contact Us</h1>
  <p class="subtitle">Have a question, feedback or bug? We'd love to hear from you.</p>

  <form id="contactForm" novalidate>
    <!-- Web3Forms access key — public key, safe to expose in frontend -->
    <input type="hidden" name="access_key" value="8c045e34-48f9-417e-9c69-6072fab71bdf">
    <input type="hidden" name="botcheck" value="">
    <input type="hidden" name="from_name" value="CampusConnect SREC">
    <input type="hidden" name="redirect" value="false">

    <div class="row">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Your name"
               value="{{ user_name }}" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@srec.ac.in"
               value="{{ user_email }}" required>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" name="subject">
        <option value="General Enquiry">General Enquiry</option>
        <option value="Bug Report">Bug Report</option>
        <option value="Feature Request">Feature Request</option>
        <option value="Account Issue">Account Issue</option>
        <option value="Content Issue">Content Issue</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message"
                placeholder="Describe your query in detail..." required></textarea>
    </div>

    <button type="submit" class="btn" id="submitBtn">
      <i class="fas fa-paper-plane"></i>
      <span id="btnText">Send Message</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="alert" id="alertBox"></div>
  </form>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn      = document.getElementById('submitBtn');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');
  const alertBox = document.getElementById('alertBox');

  alertBox.className = 'alert';
  alertBox.textContent = '';

  const name    = document.getElementById('name').value.trim();
  const email   = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  if (!name || !email || !message) {
    alertBox.className = 'alert error';
    alertBox.textContent = 'Please fill in Name, Email and Message.';
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Sending...';

  try {
    // Send DIRECTLY to Web3Forms from browser (required by free plan)
    const formData = new FormData(e.target);
    const res = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.success) {
      alertBox.className = 'alert success';
      alertBox.textContent = 'Message sent successfully! We will get back to you soon.';
      document.getElementById('message').value = '';
    } else {
      alertBox.className = 'alert error';
      alertBox.textContent = data.message || 'Something went wrong. Please try again.';
    }
  } catch(err) {
    alertBox.className = 'alert error';
    alertBox.textContent = 'Network error. Please check your connection.';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Send Message';
  }
});
</script>
</body>
</html>
