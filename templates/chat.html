<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SREC AI Chatbot - Mini Project Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .chat-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 400px;
            max-width: 96vw;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #4CAF50;
            color: white;
            padding: 18px;
            border-radius: 10px 10px 0 0;
            font-size: 1.3em;
            text-align: center;
        }
        #chatbox {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            font-size: 1em;
        }
        .message { margin: 12px 0; }
        .user-message {
            color: #2196F3;
            font-weight: bold;
            text-align: right;
        }
        .bot-message {
            color: #4CAF50;
            text-align: left;
        }
        .input-container {
            display: flex;
            padding: 15px;
            border-radius: 0 0 10px 10px;
            border-top: 1px solid #eee;
        }
        #messageInput {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 1em;
        }
        #sendButton {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 22px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }
        #sendButton:hover {
            background: #43a047;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        🤖 SREC AI Assistant<br>
        <span style="font-size:0.8em;font-weight:normal;">Mini Project Demo - Local LLM</span>
    </div>
    <div id="chatbox">
        <div class="message bot-message">
            <strong>SREC Bot:</strong> Hello! I'm your SREC AI Assistant. I can help you with information about SREC, courses, admissions, and more. Ask me anything!
        </div>
    </div>
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Ask about SREC..." onkeypress="if(event.key==='Enter'){sendMessage()}">
        <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>
</div>
<script>
    function addMessage(content, isUser=false) {
        const chatbox = document.getElementById('chatbox');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
        msgDiv.innerHTML = (isUser ? '<strong>You:</strong> ' : '<strong>SREC Bot:</strong> ') + content;
        chatbox.appendChild(msgDiv);
        chatbox.scrollTop = chatbox.scrollHeight;
    }
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;
        addMessage(message, true);
        input.value = '';
        fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: message})
        })
        .then(resp => resp.json())
        .then(data => {
            addMessage(data.response);
        }).catch(() => {
            addMessage("Sorry, I encountered an error.");
        });
    }
</script>
</body>
</html>
